<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https: marker-file: blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'">
  <link rel="stylesheet" href="./assets/style-Bw5clF0G.css">
  <style>
    /* Theme variables */
    :root, [data-theme="dark"] {
      --bg-primary: #1e1e1e;
      --text-primary: #ccc;
      --text-secondary: #999;
      --border-color: #333;
      --search-highlight: rgba(255, 215, 0, 0.3);
      --search-current: rgba(255, 165, 0, 0.5);
      --code-bg: rgba(255, 255, 255, 0.06);
    }
    [data-theme="light"] {
      --bg-primary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --border-color: #ddd;
      --search-highlight: rgba(255, 215, 0, 0.4);
      --search-current: rgba(255, 165, 0, 0.6);
      --code-bg: rgba(0, 0, 0, 0.04);
    }

    body { margin: 0; padding: 0; background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
    #editor-host { height: 100vh; overflow: hidden; position: relative; }
    .editor-tab-container { padding: 6px clamp(2px, 0.75vw, 12px); }
    .milkdown { max-width: none; }
    .milkdown, .milkdown .editor, .milkdown .ProseMirror { background: transparent !important; color: var(--text-primary) !important; }
    .milkdown .ProseMirror { padding: 4px 28px 4px 40px !important; margin: 0 !important; }
    .milkdown-block-handle { gap: 0 !important; transform: translateY(7px) translateX(15px); }
    .milkdown-block-handle .operation-item { width: 20px !important; height: 20px !important; padding: 2px !important; }
    .milkdown-block-handle .operation-item svg { width: 16px !important; height: 16px !important; }
    .search-highlight { background: var(--search-highlight); border-radius: 2px; }
    .search-current { background: var(--search-current); border-radius: 2px; }

    /* Light theme overrides for Milkdown Crepe elements */
    [data-theme="light"] .milkdown code { background: var(--code-bg) !important; }
    [data-theme="light"] .milkdown blockquote { border-left-color: var(--border-color) !important; }
    [data-theme="light"] .milkdown hr { border-color: var(--border-color) !important; }
    [data-theme="light"] .milkdown .ProseMirror .placeholder { color: #999 !important; }
    [data-theme="light"] .milkdown .ProseMirror p.is-editor-empty::before { color: #999 !important; }
    [data-theme="light"] .milkdown .ProseMirror [data-placeholder]::before { color: #999 !important; }
    [data-theme="light"] .milkdown a { color: #0066cc !important; }
  </style>
</head>
<body>
  <div id="editor-host"></div>
  <script src="./editor.js"></script>
  <script>
    // Auto-init after the IIFE has run
    if (window.marker) {
      window.marker.init();
    }
  </script>
</body>
</html>
